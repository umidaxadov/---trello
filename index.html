<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини-клон trello</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    
    <div class="app">
        <div class="boards">
            <div class="boards__item">
                <span contenteditable="true" class="title">Введите название</span>
                <div class="list">
                    <div class="list__item" draggable="true">Стартова карточка</div>
                </div>

                <div class="form">
                    <textarea class="textarea" placeholder="Введите название для этой карточки"></textarea>
                    
                    <div class="button"><div>
                </div> 

            </div>
        </div>
    </div>


    <script src="script.js"></script>  
</body>                      
</html>
